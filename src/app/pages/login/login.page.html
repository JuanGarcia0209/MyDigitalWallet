<ion-header>
  <ion-toolbar>
    <ion-title>Iniciar sesion</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="login()" class="form-grid">
    <app-custom-input label="Email" [control]="form.controls.email" type="email" placeholder="correo@dominio.com"></app-custom-input>
    <app-custom-input label="Contrasena" [control]="form.controls.password" type="password" placeholder="******"></app-custom-input>

    <ion-button type="submit" expand="block">Ingresar</ion-button>
    <ion-button expand="block" fill="outline" (click)="loginWithBiometric()">Ingresar con biometria</ion-button>
    <ion-button expand="block" color="danger" (click)="loginGoogle()">Ingresar con Google</ion-button>
    <ion-button expand="block" fill="clear" routerLink="/register">Crear cuenta</ion-button>
  </form>
</ion-content>
