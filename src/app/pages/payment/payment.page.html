<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" (click)="goBack()">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Historial de transacciones</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-select label="Tarjeta" labelPlacement="stacked" [(ngModel)]="selectedCardId" (ionChange)="loadTransactions()">
      <ion-select-option *ngFor="let card of cards" [value]="card.id">{{ card.maskedNumber }} - {{ card.brand | titlecase }}</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-modal [isOpen]="showSimulatorModal" (didDismiss)="closeSimulatorModal()">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Simulador de pago</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="closeSimulatorAndGoHome()">Cerrar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding">
        <app-payment-simulator
          [card]="selectedCard"
          [merchant]="merchant"
          [amount]="amount"
          (regenerate)="regenerateSimulation()"
          (confirm)="processPayment()"
        ></app-payment-simulator>
      </ion-content>
    </ng-template>
  </ion-modal>

  <h2 class="section-title">Historial de transacciones</h2>
  <app-calendar (dateChange)="onDateFilter($event)"></app-calendar>

  <app-transaction-list
    [transactions]="transactions"
    (itemLongPress)="openEmojiPicker($event)"
  ></app-transaction-list>

  <ion-modal [isOpen]="showEmojiPicker" (didDismiss)="closeEmojiPicker()" class="emoji-picker-modal">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Seleccionar reaccion</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="closeEmojiPicker()">Cerrar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content class="emoji-picker-content">
        <emoji-mart
          class="emoji-picker"
          [style]="{ width: '100%', height: '100%' }"
          (emojiClick)="onEmojiSelect($event)"
        ></emoji-mart>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
