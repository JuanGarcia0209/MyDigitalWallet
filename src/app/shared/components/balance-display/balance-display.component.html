<ion-card class="balance-card">
  <ion-card-header>
    <ion-card-subtitle>Saldo total</ion-card-subtitle>
    <ion-card-title>
      {{ hidden ? '••••••' : ('$' + (balance | number)) }}
    </ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-button fill="clear" size="small" (click)="toggle()">
      {{ hidden ? 'Mostrar' : 'Ocultar' }}
    </ion-button>
  </ion-card-content>
</ion-card>
