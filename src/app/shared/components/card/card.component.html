<ion-card [class]="card.brand">
  <ion-card-header>
    <ion-card-title>{{ card.brand | titlecase }}</ion-card-title>
    <ion-card-subtitle>{{ card.holderName }}</ion-card-subtitle>
  </ion-card-header>
  <ion-card-content>
    <p class="number">{{ card.maskedNumber }}</p>
    <p>Exp: {{ card.expiry }}</p>
  </ion-card-content>
</ion-card>
