<ion-item *ngFor="let row of skeletonRows">
  <ion-thumbnail slot="start">
    <ion-skeleton-text [animated]="true" style="width: 48px; height: 48px"></ion-skeleton-text>
  </ion-thumbnail>
  <ion-label>
    <h3><ion-skeleton-text [animated]="true" style="width: 70%"></ion-skeleton-text></h3>
    <p><ion-skeleton-text [animated]="true" style="width: 40%"></ion-skeleton-text></p>
  </ion-label>
</ion-item>
